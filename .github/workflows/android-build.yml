name: Android CI - Build APKs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build server and client APKs
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Install Android command-line tools (sdkmanager)
        run: |
          set -e
          if ! command -v sdkmanager >/dev/null 2>&1; then
            mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            cd $HOME
            curl -fLo commandlinetools.zip "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
            unzip -q commandlinetools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
              mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
            fi
          fi
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build APKs (clean and assembleDebug with info)
        run: gradle --no-daemon clean :servidor:app:assembleDebug :cliente:app:assembleDebug --info

      - name: Upload servidor APK
        uses: actions/upload-artifact@v4
        with:
          name: servidor-debug-apk
          path: servidor/app/build/outputs/apk/debug/*.apk

      - name: Upload cliente APK
        uses: actions/upload-artifact@v4
        with:
          name: cliente-debug-apk
          path: cliente/app/build/outputs/apk/debug/*.apk
