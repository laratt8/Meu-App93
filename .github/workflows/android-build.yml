name: Android CI - Build APKs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build server and client APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Ensure gradlew is executable
        run: chmod +x gradlew || true

      - name: Build APKs (assembleDebug)
        run: ./gradlew :servidor:app:assembleDebug :cliente:app:assembleDebug --no-daemon

      - name: Upload servidor APK
        uses: actions/upload-artifact@v4
        with:
          name: servidor-debug-apk
          path: servidor/app/build/outputs/apk/debug/*.apk

      - name: Upload cliente APK
        uses: actions/upload-artifact@v4
        with:
          name: cliente-debug-apk
          path: cliente/app/build/outputs/apk/debug/*.apk
